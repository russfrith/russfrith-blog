name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Hugo extended 0.158.0
        run: |
          wget https://github.com/gohugoio/hugo/releases/download/v0.158.0/hugo_extended_0.158.0_linux-amd64.tar.gz
          tar -xzf hugo_extended_0.158.0_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Build site
        run: |
          rm -rf public
          hugo --minify --destination ./public

      - name: Verify built output
        run: |
          echo "PWD=$(pwd)"
          ls -la
          if [ ! -d "public" ]; then
            echo "ERROR: public folder not found"
            exit 1
          fi
          if [ ! -f "public/index.html" ]; then
            echo "ERROR: public/index.html not found"
            exit 1
          fi
          find public -maxdepth 2 -type f | sort | head -n 50

      - name: Build And Deploy
        id: builddeploy
        env:
          VERBOSE: true
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_HILL_0B484F80F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "public"
          api_location: ""
          output_location: ""
          skip_app_build: true
          